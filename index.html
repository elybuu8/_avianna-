```html
<!DOCTYPE html>
<html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">

<style>

/* PAGE */
body{
background-color:#feeff4;
font-family:'Quicksand', sans-serif;
text-align:center;
margin:0;
}

/* TITLE */
h1{
font-family:'Pacifico', cursive;
color:#000000;
margin-top:20px;
}

/* NAVIGATION */
nav a{
text-decoration:none;
color:#000000;
font-weight:bold;
margin:10px;
padding:8px 12px;
border-radius:12px;
background-color:#fc94af;
transition:0.3s;
}

nav a:hover{
background-color:#ffb6c1;
color:white;
}

/* INTERACTIVE IMAGE SECTION */

.gallery{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin:30px;
}

.pic-card{
position:relative;
width:250px;
height:170px;
overflow:hidden;
border-radius:15px;
cursor:pointer;
}

.pic-card img{
width:100%;
height:100%;
object-fit:cover;
transition:0.5s;
}

.pic-card:hover img{
transform:scale(1.1);
}

.overlay{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.6);
color:white;
padding:10px;
transform:translateY(100%);
transition:0.4s;
}

.pic-card:hover .overlay{
transform:translateY(0);
}

/* SCRAPBOOK CARDS */

.scrapbook{
display:flex;
flex-wrap:wrap;
justify-content:center;
margin:20px;
}

.card{
background-color:#ffb6c1;
border-radius:20px;
width:220px;
margin:15px;
padding:15px;
box-shadow:4px 4px 8px rgba(0,0,0,0.2);
transition:transform 0.2s;
}

.card:hover{
transform:rotate(-2deg) scale(1.05);
}

.card p{
text-align:center;
font-size:14px;
}

.card b{
color:#000000;
}

</style>

</head>

<body>

<h1>My Achievements</h1>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About Me</a>
<a href="achievements.html"><span>Achievements</span></a>
<a href="contact.html">Contact Info</a>
</nav>

<hr>

<!-- INTERACTIVE IMAGES -->

<div class="gallery">

<a href="about.html">
<div class="pic-card">
<img src="about.jpg">
<div class="overlay">
<h3>About Me</h3>
</div>
</div>
</a>

<a href="achievements.html">
<div class="pic-card">
<img src="achievement.jpg">
<div class="overlay">
<h3>Achievements</h3>
</div>
</div>
</a>

<a href="contact.html">

<div class="overlay">

</div>
</div>

</div>

</div>

</div>

</body>
</html>
